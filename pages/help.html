<h2>帮助中心</h2>
<div class="help-content">
    <h3>如何登录？</h3>
    <p>在登录页面输入您的用户名和密码即可登录。默认管理员账号为 admin，密码为 admin123。</p>

    <h3>如何注册？</h3>
    <p>点击导航栏的"注册"链接，填写用户名、密码、邮箱和手机号即可完成注册。</p>

    <h3>如何搜索用户？</h3>
    <p>登录后，在首页的搜索框中输入用户名或邮箱关键词，点击搜索按钮即可查找用户。</p>

    <h3>如何上传头像？</h3>
    <p>登录后点击导航栏的"上传头像"，选择图片文件即可上传，支持 JPG、PNG、GIF、WebP 格式。</p>

    <h3>如何查看个人中心？</h3>
    <p>登录后点击导航栏的"个人中心"，可查看您的个人信息和余额。</p>

    <h3>如何充值？</h3>
    <p>在个人中心页面，输入充值金额并点击充值按钮即可。注意：金额可正可负。</p>
</div>
